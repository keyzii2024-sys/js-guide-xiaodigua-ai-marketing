<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小地瓜AI营销 - 动态预览</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #e9eef5;
      }

      .wrap {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }

      iframe {
        width: 1920px;
        height: 1080px;
        border: 0;
        transform: scale(min(calc(100vw / 1920), calc(100vh / 1080)));
        transform-origin: center;
        box-shadow: 0 34px 110px rgba(38, 48, 64, 0.18);
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <iframe id="preview" src="./scene.html?captureTime=0"></iframe>
    </div>
    <audio id="music" src="./assets/audio/apple-tech-bed.wav" loop></audio>
    <script>
      const iframe = document.getElementById("preview");
      const music = document.getElementById("music");
      let startedAt = 0;

      const tick = (now) => {
        if (!startedAt) startedAt = now;
        const time = ((now - startedAt) / 1000) % 30;
        iframe.contentWindow?.setCaptureTime?.(time);
        requestAnimationFrame(tick);
      };

      iframe.addEventListener("load", () => {
        requestAnimationFrame(tick);
        music.volume = 0.34;
        music.play().catch(() => {
          window.addEventListener("pointerdown", () => music.play(), { once: true });
        });
      });
    </script>
  </body>
</html>
